<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clinic Appointment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }
        
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .navbar h1 {
            font-size: 24px;
        }
        
        .navbar-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .navbar-right a, .navbar-right button {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            border: none;
            background: transparent;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .navbar-right a:hover, .navbar-right button:hover {
            background-color: #34495e;
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .table-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background-color: #34495e;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ecf0f1;
        }
        
        tr:hover {
            background-color: #f8f9fa;
        }
        
        .doctor-image {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            object-fit: cover;
        }
        
        .actions {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
        
        .btn-book {
            background-color: #27ae60;
            color: white;
        }
        
        .btn-book:hover {
            background-color: #229954;
        }
        
        .btn-view {
            background-color: #3498db;
            color: white;
        }
        
        .btn-view:hover {
            background-color: #2980b9;
        }
        
        .btn-edit {
            background-color: #f39c12;
            color: white;
        }
        
        .btn-edit:hover {
            background-color: #e67e22;
        }
        
        .btn-delete {
            background-color: #e74c3c;
            color: white;
        }
        
        .btn-delete:hover {
            background-color: #c0392b;
        }
        
        .btn-appointments {
            background-color: #9b59b6;
            color: white;
        }
        
        .btn-appointments:hover {
            background-color: #8e44ad;
        }
        
        .alert {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 4px;
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Clinic Appointment</h1>
        <div class="navbar-right">
            <span sec:authorize="isAuthenticated()">
                Xin chào: <strong sec:authentication="name"></strong>
            </span>
            <a href="/home">Trang chủ</a>
            <span sec:authorize="hasRole('ADMIN')">
                <a href="/admin/doctors">Quản lý Bác sĩ</a>
            </span>
            <span sec:authorize="hasRole('PATIENT')">
                <a href="/appointments/my-appointments">Lịch khám của tôi</a>
            </span>
            <span sec:authorize="!isAuthenticated()">
                <a href="/register">Đăng ký</a>
                <a href="/login">Đăng nhập</a>
            </span>
            <span sec:authorize="isAuthenticated()">
                <form action="/logout" method="post" style="display:inline;">
                    <button type="submit">Đăng xuất</button>
                </form>
            </span>
        </div>
    </div>
    
    <div class="container">
        <h2>Danh sách Bác sĩ</h2>
        
        <div style="margin-bottom: 20px; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
            <div style="display: flex; gap: 10px; align-items: center;">
                <label for="searchInput" style="font-weight: 600;">Tìm kiếm bác sĩ:</label>
                <input type="text" id="searchInput" placeholder="Nhập tên bác sĩ..." style="flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 4px;">
                <button type="button" id="searchBtn" style="padding: 8px 20px; background-color: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background-color 0.3s;">🔍 Tìm kiếm</button>
                <button type="button" id="clearBtn" style="padding: 8px 20px; background-color: #95a5a6; color: white; border: none; border-radius: 4px; cursor: pointer; transition: background-color 0.3s;">Xóa</button>
            </div>
            <div id="searchInfo" style="margin-top: 10px; color: #7f8c8d; display: none;"></div>
            <div id="loading" style="margin-top: 10px; color: #3498db; display: none; font-weight: bold;">⏳ Đang tìm kiếm...</div>
        </div>
        
        <div th:if="${param.success}" class="alert">
            ✓ Thành công!
        </div>
        
        <div class="table-container">
            <div id="doctorsTable"></div>
        </div>
    </div>
    
    <script>
        // Get current user's role from template if available
        const isPatient = document.documentElement.getAttribute('data-role') === 'PATIENT';
        const isAdmin = document.documentElement.getAttribute('data-role') === 'ADMIN';
        
        // Render doctors table using JavaScript
        function renderDoctorsTable(doctors) {
            const container = document.getElementById('doctorsTable');
            
            if (!doctors || doctors.length === 0) {
                container.innerHTML = `
                    <div style="text-align: center; padding: 40px; color: #7f8c8d;">
                        <h3>Không tìm thấy bác sĩ nào</h3>
                        <p>Thử tìm kiếm với từ khóa khác hoặc xóa bộ lọc.</p>
                    </div>
                `;
                return;
            }
            
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Hình ảnh</th>
                            <th>Tên Bác sĩ</th>
                            <th>Chuyên khoa</th>
                            <th>Khoa</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
            `;
            
            doctors.forEach(doctor => {
                const imageUrl = doctor.image || 'https://via.placeholder.com/50';
                const departmentName = doctor.department ? doctor.department.name : 'N/A';
                
                let actions = '<a href="#" class="btn btn-book">Xem chi tiết</a>';
                actions += `<a href="/appointments/book/${doctor.id}" class="btn btn-book">Đặt lịch</a>`;
                actions += `<a href="/appointments/my-appointments" class="btn btn-appointments">Lịch khám của tôi</a>`;
                
                html += `
                    <tr>
                        <td><img src="${imageUrl}" alt="Doctor" class="doctor-image" onerror="this.src='https://via.placeholder.com/50'"></td>
                        <td>${escapeHtml(doctor.name)}</td>
                        <td>${escapeHtml(doctor.specialty)}</td>
                        <td>${escapeHtml(departmentName)}</td>
                        <td>
                            <div class="actions">
                                ${actions}
                            </div>
                        </td>
                    </tr>
                `;
            });
            
            html += `
                    </tbody>
                </table>
            `;
            
            container.innerHTML = html;
        }
        
        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }
        
        // Perform AJAX search
        function performSearch() {
            const keyword = document.getElementById('searchInput').value.trim();
            const loading = document.getElementById('loading');
            const searchInfo = document.getElementById('searchInfo');
            
            loading.style.display = 'block';
            searchInfo.style.display = 'none';
            
            fetch(`/api/search-doctors?keyword=${encodeURIComponent(keyword)}`)
                .then(response => {
                    if (!response.ok) throw new Error('Network response error');
                    return response.json();
                })
                .then(data => {
                    loading.style.display = 'none';
                    renderDoctorsTable(data);
                    
                    if (keyword) {
                        const resultCount = data ? data.length : 0;
                        searchInfo.innerHTML = `Kết quả tìm kiếm cho: "<strong>${escapeHtml(keyword)}</strong>" (<strong>${resultCount}</strong> kết quả)`;
                        searchInfo.style.display = 'block';
                    }
                })
                .catch(error => {
                    loading.style.display = 'none';
                    console.error('Search error:', error);
                    document.getElementById('doctorsTable').innerHTML = '<div style="color: red; padding: 20px; text-align: center;">⚠️ Lỗi khi tìm kiếm. Vui lòng thử lại.</div>';
                });
        }
        
        // Event listeners
        document.getElementById('searchBtn').addEventListener('click', performSearch);
        document.getElementById('searchBtn').addEventListener('mouseover', function() {
            this.style.backgroundColor = '#2980b9';
        });
        document.getElementById('searchBtn').addEventListener('mouseout', function() {
            this.style.backgroundColor = '#3498db';
        });
        
        document.getElementById('clearBtn').addEventListener('mouseover', function() {
            this.style.backgroundColor = '#7f8c8d';
        });
        document.getElementById('clearBtn').addEventListener('mouseout', function() {
            this.style.backgroundColor = '#95a5a6';
        });
        
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' || e.keyCode === 13) {
                performSearch();
            }
        });
        
        document.getElementById('clearBtn').addEventListener('click', function() {
            document.getElementById('searchInput').value = '';
            document.getElementById('searchInfo').style.display = 'none';
            performSearch();
        });
        
        // Load all doctors when page loads
        window.addEventListener('load', function() {
            performSearch();
        });
    </script>
