<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${doctor.id} ? 'Sửa Bác sĩ' : 'Thêm Bác sĩ mới'">Form Bác sĩ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }
        
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .navbar h1 {
            font-size: 24px;
        }
        
        .navbar-right {
            display: flex;
            gap: 20px;
        }
        
        .navbar-right a, .navbar-right button {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            border: none;
            background: transparent;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .navbar-right a:hover, .navbar-right button:hover {
            background-color: #34495e;
        }
        
        .container {
            max-width: 600px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        .form-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            padding: 30px;
        }
        
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 600;
        }
        
        input[type="text"],
        input[type="email"],
        input[type="url"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #bdc3c7;
            border-radius: 5px;
            font-size: 14px;
            font-family: inherit;
        }
        
        input:focus,
        select:focus {
            outline: none;
            border-color: #2c3e50;
            box-shadow: 0 0 5px rgba(44, 62, 80, 0.1);
        }
        
        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 30px;
        }
        
        .btn {
            padding: 12px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-submit {
            background-color: #27ae60;
            color: white;
            flex: 1;
        }
        
        .btn-submit:hover {
            background-color: #229954;
        }
        
        .btn-cancel {
            background-color: #95a5a6;
            color: white;
            flex: 1;
        }
        
        .btn-cancel:hover {
            background-color: #7f8c8d;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🏥 Clinic Appointment - Admin</h1>
        <div class="navbar-right">
            <a href="/admin/doctors">← Quay lại</a>
            <form action="/logout" method="post" style="display:inline;">
                <button type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
    
    <div class="container">
        <div class="form-container">
            <h2 th:text="${doctor.id} ? 'Sửa thông tin Bác sĩ' : 'Thêm Bác sĩ mới'"></h2>
            
            <form th:object="${doctor}" 
                  th:action="${doctor.id} ? @{/admin/doctors/{id}(id=${doctor.id})} : @{/admin/doctors}" 
                  method="post">
                <div class="form-group">
                    <label for="name">Tên Bác sĩ:</label>
                    <input type="text" id="name" th:field="*{name}" required placeholder="Nhập tên bác sĩ">
                </div>
                
                <div class="form-group">
                    <label for="specialty">Chuyên khoa:</label>
                    <input type="text" id="specialty" th:field="*{specialty}" required placeholder="Ví dụ: Tim mạch, Nha khoa...">
                </div>
                
                <div class="form-group">
                    <label for="department">Khoa:</label>
                    <select id="department" name="departmentId" required>
                        <option value="">-- Chọn khoa --</option>
                        <option th:each="dept : ${departments}" 
                                th:value="${dept.id}" 
                                th:text="${dept.name}"
                                th:selected="${doctor.department != null and doctor.department.id == dept.id}">
                        </option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label for="image">Hình ảnh (URL):</label>
                    <input type="url" id="image" th:field="*{image}" placeholder="Nhập link hình ảnh">
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn btn-submit" th:text="${doctor.id} ? '💾 Cập nhật' : '💾 Thêm mới'"></button>
                    <a href="/admin/doctors" class="btn btn-cancel">❌ Hủy</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
