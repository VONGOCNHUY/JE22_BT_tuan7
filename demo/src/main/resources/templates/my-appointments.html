<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lịch khám của tôi - Clinic Appointment</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f5f5;
        }
        
        .navbar {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .navbar h1 {
            font-size: 24px;
        }
        
        .navbar-right {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .navbar-right a, .navbar-right button {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 4px;
            border: none;
            background: transparent;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        
        .navbar-right a:hover, .navbar-right button:hover {
            background-color: #34495e;
        }
        
        .container {
            max-width: 1200px;
            margin: 30px auto;
            padding: 0 20px;
        }
        
        h2 {
            color: #2c3e50;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .table-container {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
        }
        
        th {
            background-color: #34495e;
            color: white;
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        
        td {
            padding: 12px 15px;
            border-bottom: 1px solid #ecf0f1;
        }
        
        tr:hover {
            background-color: #f8f9fa;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #7f8c8d;
        }
        
        .empty-state h3 {
            margin-bottom: 10px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 20px;
            color: #3498db;
            text-decoration: none;
        }
        
        .back-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>Clinic Appointment</h1>
        <div class="navbar-right">
            <span>Xin chào: <strong sec:authentication="name"></strong></span>
            <a href="/home">Trang chủ</a>
            <form action="/logout" method="post" style="display:inline;">
                <button type="submit">Đăng xuất</button>
            </form>
        </div>
    </div>
    
    <div class="container">
        <h2>Lịch khám của tôi</h2>
        
        <div class="table-container">
            <div th:if="${#lists.isEmpty(appointments)}" class="empty-state">
                <h3>Chưa có lịch khám nào</h3>
                <p>Bạn chưa đặt lịch khám. <a href="/home" style="color: #3498db;">Quay lại trang chủ để đặt lịch khám.</a></p>
            </div>
            
            <table th:unless="${#lists.isEmpty(appointments)}">
                <thead>
                    <tr>
                        <th>Bác sĩ</th>
                        <th>Chuyên khoa</th>
                        <th>Khoa</th>
                        <th>Ngày khám</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="appointment : ${appointments}">
                        <td th:text="${appointment.doctor.name}"></td>
                        <td th:text="${appointment.doctor.specialty}"></td>
                        <td th:text="${appointment.doctor.department.name}"></td>
                        <td th:text="${#temporals.format(appointment.appointmentDate, 'dd/MM/yyyy HH:mm')}"></td>
                    </tr>
                </tbody>
            </table>
        </div>
        
        <a href="/home" class="back-link">← Quay lại trang chủ</a>
    </div>
</body>
</html>
